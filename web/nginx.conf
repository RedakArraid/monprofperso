server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 20m;

    # Canonique : redirige l'apex vers www (Traefik transmet le Host d'origine).
    if ($host = monprofperso.com) {
        return 301 https://www.monprofperso.com$request_uri;
    }

    location /api/ {
        proxy_pass http://api:8099/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /health {
        proxy_pass http://api:8099/health;
    }

    location = /admin {
        return 301 /admin/;
    }

    location /admin/ {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        try_files $uri $uri/ /admin/index.html;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
