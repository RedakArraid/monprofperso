# ======================================================================
# Mon Prof Perso — stack backend partagée (Android + iOS consomment la même API)
#
# Les identifiants et ports sont lus depuis `.env` (non versionné ; voir
# .env.example). Les valeurs ${VAR:-defaut} permettent un démarrage immédiat
# en dev même sans .env, mais en prod le .env DOIT fournir un secret fort.
#
# Ports hôte choisis pour éviter les collisions (5432/5433/6543/6379/8000…
# déjà occupés sur cette machine) :
#   - API       → http://localhost:${API_PORT:-8099}
#   - Postgres  → localhost:${PG_HOST_PORT:-5544}
#   - Adminer   → http://localhost:${ADMINER_PORT:-8098}   (UI d'admin DB, optionnel)
# ======================================================================
services:
  db:
    image: postgres:16-alpine
    container_name: monprofperso-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-monprofperso}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-monprofperso}
      POSTGRES_DB: ${POSTGRES_DB:-monprofperso}
    ports:
      - "${PG_HOST_PORT:-5544}:5432"     # hôte:conteneur
    volumes:
      - monprofperso_pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-monprofperso} -d ${POSTGRES_DB:-monprofperso}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./api
    container_name: monprofperso-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: ${API_PORT:-8099}
      PGHOST: db
      PGPORT: 5432
      PGUSER: ${POSTGRES_USER:-monprofperso}
      PGPASSWORD: ${POSTGRES_PASSWORD:-monprofperso}
      PGDATABASE: ${POSTGRES_DB:-monprofperso}
    ports:
      - "${API_PORT:-8099}:${API_PORT:-8099}"

  adminer:
    image: adminer:4
    container_name: monprofperso-adminer
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "${ADMINER_PORT:-8098}:8080"     # Système: PostgreSQL, Serveur: db

volumes:
  monprofperso_pgdata:
