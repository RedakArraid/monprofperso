# ======================================================================
# Mon Prof Perso — stack backend partagée (Android + iOS consomment la même API)
#
# Les identifiants et ports sont lus depuis `.env` (non versionné ; voir
# .env.example). Les valeurs ${VAR:-defaut} permettent un démarrage immédiat
# en dev même sans .env, mais en prod le .env DOIT fournir un secret fort.
#
# Ports hôte choisis pour éviter les collisions (5432/5433/6543/6379/8000…
# déjà occupés sur cette machine) :
#   - API       → http://localhost:${API_PORT:-8099}
#   - Postgres  → localhost:${PG_HOST_PORT:-5544}
#   - Adminer   → http://localhost:${ADMINER_PORT:-8098}   (UI d'admin DB, optionnel)
# ======================================================================
services:
  db:
    image: postgres:16-alpine
    container_name: monprofperso-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-monprofperso}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-monprofperso}
      POSTGRES_DB: ${POSTGRES_DB:-monprofperso}
    ports:
      - "${PG_HOST_PORT:-5544}:5432"     # hôte:conteneur
    volumes:
      - monprofperso_pgdata:/var/lib/postgresql/data
      # Le schéma et le seed sont gérés par les migrations (node-pg-migrate),
      # appliquées au démarrage de l'API — plus de init.sql ici.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-monprofperso} -d ${POSTGRES_DB:-monprofperso}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Stockage objet S3-compatible pour les fichiers de ressources (durable,
  # hors-Postgres). API S3 sur ${MINIO_API_PORT:-9000}, console web sur
  # ${MINIO_CONSOLE_PORT:-8097}.
  # MinIO local — optionnel si S3_ENDPOINT pointe vers Cloudflare R2 (voir .env).
  # Démarrer avec : docker compose --profile local-minio up -d
  minio:
    profiles: ["local-minio"]
    image: minio/minio:latest
    container_name: monprofperso-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-monprofperso}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-monprofperso-secret}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-8097}:9001"
    volumes:
      - monprofperso_miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./api
    container_name: monprofperso-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: ${API_PORT:-8099}
      PGHOST: db
      PGPORT: 5432
      PGUSER: ${POSTGRES_USER:-monprofperso}
      PGPASSWORD: ${POSTGRES_PASSWORD:-monprofperso}
      PGDATABASE: ${POSTGRES_DB:-monprofperso}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      S3_ENDPOINT: ${S3_ENDPOINT:-minio}
      S3_PORT: ${S3_PORT:-9000}
      S3_USE_SSL: ${S3_USE_SSL:-false}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-monprofperso}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-monprofperso-secret}
      S3_BUCKET: ${S3_BUCKET:-monprofperso}
    ports:
      - "${API_PORT:-8099}:${API_PORT:-8099}"

  adminer:
    image: adminer:4
    container_name: monprofperso-adminer
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "${ADMINER_PORT:-8098}:8080"     # Système: PostgreSQL, Serveur: db

  # Page vitrine statique (dossier ../web), servie par nginx. Aucun build.
  web:
    image: nginx:alpine
    container_name: monprofperso-web
    restart: unless-stopped
    depends_on:
      - api
    volumes:
      - ../web:/usr/share/nginx/html:ro
      - ../web/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${WEB_PORT:-8095}:80"           # http://localhost:8095

volumes:
  monprofperso_pgdata:
  monprofperso_miniodata:
