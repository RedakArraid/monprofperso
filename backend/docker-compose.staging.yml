# =============================================================================
# Mon Prof Perso — STAGING (VPS Contabo + Traefik)
# =============================================================================
#   docker compose -f docker-compose.staging.yml --env-file .env.staging up -d --build
#   Web : https://staging.monprofperso.com  |  API : https://staging-api.monprofperso.com
# =============================================================================

name: monprofperso-staging

services:
  db:
    image: postgres:16-alpine
    container_name: monprofperso-staging-db
    restart: unless-stopped
    env_file:
      - .env.staging
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-monprofperso}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD requis}
      POSTGRES_DB: ${POSTGRES_DB:-monprofperso_staging}
    volumes:
      - monprofperso_staging_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-monprofperso} -d ${POSTGRES_DB:-monprofperso_staging}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - monprofperso_staging_internal

  api:
    build: ./api
    container_name: monprofperso-staging-api
    restart: unless-stopped
    env_file:
      - .env.staging
    environment:
      PORT: 8099
      PGHOST: db
      PGPORT: 5432
      PGUSER: ${POSTGRES_USER:-monprofperso}
      PGPASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD requis}
      PGDATABASE: ${POSTGRES_DB:-monprofperso_staging}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET requis}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_PORT: ${S3_PORT:-443}
      S3_USE_SSL: ${S3_USE_SSL:-true}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-}
      S3_BUCKET: ${S3_BUCKET:-monprofperso-staging}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8099/health | grep -q ok || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - traefik_network
      - monprofperso_staging_internal
    labels:
      - traefik.enable=true
      - traefik.http.middlewares.monprofperso-staging-robots.headers.customResponseHeaders.X-Robots-Tag=noindex, nofollow
      - traefik.http.services.monprofperso-staging-api.loadbalancer.server.port=8099
      - traefik.http.routers.monprofperso-staging-api.rule=Host(`staging-api.monprofperso.com`)
      - traefik.http.routers.monprofperso-staging-api.entrypoints=websecure
      - traefik.http.routers.monprofperso-staging-api.tls=true
      - traefik.http.routers.monprofperso-staging-api.tls.certresolver=mytlschallenge
      - traefik.http.routers.monprofperso-staging-api.middlewares=monprofperso-staging-robots
      - traefik.http.routers.monprofperso-staging-api.service=monprofperso-staging-api

  web:
    image: nginx:alpine
    container_name: monprofperso-staging-web
    restart: unless-stopped
    depends_on:
      - api
    volumes:
      - ../web:/usr/share/nginx/html:ro
      - ../web/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:80/ | grep -qi html || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - traefik_network
      - monprofperso_staging_internal
    labels:
      - traefik.enable=true
      - traefik.http.services.monprofperso-staging-web.loadbalancer.server.port=80
      - traefik.http.routers.monprofperso-staging-web.rule=Host(`staging.monprofperso.com`)
      - traefik.http.routers.monprofperso-staging-web.entrypoints=websecure
      - traefik.http.routers.monprofperso-staging-web.tls=true
      - traefik.http.routers.monprofperso-staging-web.tls.certresolver=mytlschallenge
      - traefik.http.routers.monprofperso-staging-web.middlewares=monprofperso-staging-robots
      - traefik.http.routers.monprofperso-staging-web.service=monprofperso-staging-web

volumes:
  monprofperso_staging_pgdata:

networks:
  traefik_network:
    external: true
  monprofperso_staging_internal:
    driver: bridge
